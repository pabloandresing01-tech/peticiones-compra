<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - Abastecimiento</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor">

        <div class="cabecera-panel">
            <div>
                <h1>Mis Solicitudes</h1>
                <p class="subtitulo">Área de Abastecimiento - Entrelagos</p>
            </div>
            <button id="boton-salir" class="boton-secundario">Cerrar sesión</button>
        </div>

        <p class="tarjeta-fila" id="sesion-activa"></p>

        <div class="filtros-panel" id="filtros-consulta">
            <input type="text" id="buscador-codigo" placeholder="Buscar por código...">
            <select id="filtro-estado-consulta">
                <option value="activas">Activas</option>
                <option value="cerradas">Cerradas</option>
                <option value="">Todas</option>
                <option value="en_revision">En revisión</option>
                <option value="en_cotizacion">En cotización</option>
                <option value="en_transito">En tránsito</option>
                <option value="completada">Completada</option>
                <option value="creada">Creada</option>
                <option value="rechazada">Rechazada</option>
                <option value="cancelada">Cancelada</option>
            </select>
        </div>

        <div id="resultados"></div>

        <p class="enlace-volver"><a href="menu.html">← Volver al inicio</a></p>

    </div>

    <script src="consultar.js"></script>
</body>
</html>
